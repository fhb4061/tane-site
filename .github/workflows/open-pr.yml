name: "Build & Test"

on:
    pull_request:
      branches:
        - main

jobs:
    TestBuild:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
            
            - name: Install pnpm
              uses: pnpm/action-setup@v6
              with:
                version: 10
                cache: true
            
            - name: Install app
              run: pnpm install --frozen-lockfile
            
            - name: Test app
              run: pnpm test
        

    